version: "3.9"

# AI BABA-G + Ollama + SQL Server in one stack.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "BabaStrong!Pass2026"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"select 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  baba:
    build: .
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__BabaDb: "Server=sqlserver,1433;Database=AIBabaG;User Id=sa;Password=BabaStrong!Pass2026;TrustServerCertificate=True;MultipleActiveResultSets=True"
      Ollama__BaseUrl: http://ollama:11434
      Ollama__ChatModel: llama3.2
      Ollama__EmbeddingModel: nomic-embed-text
      Jwt__Key: change_me_to_a_long_random_string_at_least_32_characters_long
    depends_on:
      sqlserver:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama:
  sql_data:
