<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your LinkedIn post is ready</title>
</head>
<body style="margin:0;padding:0;background:#0F172A;font-family:'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:linear-gradient(180deg,#0F172A 0%,#1E293B 100%);padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:rgba(30,41,59,0.9);border-radius:16px;border:1px solid rgba(148,163,184,0.2);overflow:hidden;">
          <tr>
            <td style="padding:32px 32px 16px;text-align:center;">
              <span style="font-size:28px;font-weight:700;background:linear-gradient(90deg,#38BDF8,#818CF8);-webkit-background-clip:text;color:#38BDF8;">LNK</span>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px;text-align:center;">
              <h1 style="margin:0;color:#F8FAFC;font-size:22px;font-weight:600;">Hi {{UserName}}, your post is ready</h1>
              <p style="color:#94A3B8;font-size:14px;margin:16px 0 0;">AI-crafted LinkedIn content — review, copy, and publish in seconds.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 24px;">
              <div style="background:#0F172A;border-radius:12px;padding:20px;border-left:4px solid #38BDF8;">
                <p style="margin:0;color:#E2E8F0;font-size:16px;font-weight:600;">{{Hook}}</p>
                <p style="margin:12px 0 0;color:#94A3B8;font-size:14px;line-height:1.6;">{{Preview}}</p>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px;text-align:center;">
              <a href="{{ReviewUrl}}" style="display:inline-block;background:linear-gradient(90deg,#2563EB,#7C3AED);color:#fff;text-decoration:none;padding:14px 32px;border-radius:10px;font-weight:600;font-size:15px;">Review &amp; Copy Post →</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px;text-align:center;border-top:1px solid rgba(148,163,184,0.15);">
              <p style="color:#64748B;font-size:12px;margin:24px 0 0;">© {{Year}} LNK · Never run out of LinkedIn content</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
