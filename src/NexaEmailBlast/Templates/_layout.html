<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>AG ONE</title>
  <style>
    /* Client-friendly resets */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; background-color: #eef1f6; }
    a { color: #1f6fff; }
    .ag-blue { color: #1f6fff; }
    .ag-cyan { color: #00c2ff; }
    @media only screen and (max-width: 620px) {
      .container { width: 100% !important; }
      .px { padding-left: 22px !important; padding-right: 22px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#eef1f6;font-family:Arial,Helvetica,sans-serif;">
  <!-- preheader (hidden preview text) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#eef1f6;opacity:0;">
    {{PREHEADER}}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#eef1f6;">
    <tr>
      <td align="center" style="padding:28px 12px;">
        <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0"
               style="width:600px;max-width:600px;background-color:#ffffff;border:1px solid #e3e8f0;border-radius:18px;overflow:hidden;">

          <!-- Header / AG ONE logo -->
          <tr>
            <td align="center" class="px" style="padding:34px 40px 6px 40px;">
              <img src="{{IMG:agone}}" alt="AG ONE" height="40" style="display:block;height:40px;width:auto;border:0;" />
            </td>
          </tr>

          <!-- Dynamic content -->
          {{CONTENT}}

          <!-- Footer (single brand image) -->
          <tr>
            <td style="background-color:#0a1f44;font-size:0;line-height:0;">
              <a href="mailto:nexa@aventragroup.com" style="text-decoration:none;">
                <img src="{{IMG:footer}}" alt="Aventra Group — AI-First, Enterprise Ready" width="600"
                     style="display:block;width:100%;max-width:600px;height:auto;border:0;" />
              </a>
            </td>
          </tr>

        </table>

        <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;">
          <tr>
            <td align="center" style="padding:18px 20px;font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#94a3b8;">
              You are receiving this email from Aventra Group. &copy; 2026 Aventra Group. All rights reserved.
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
