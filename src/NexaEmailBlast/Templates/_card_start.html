<table role="presentation" width="100%" cellpadding="0" cellspacing="0" bgcolor="#EBF3FF"
       style="border-collapse:separate;border-spacing:0;border-radius:16px;overflow:hidden;background-color:#EBF3FF;">
  <tr>
    <td align="center" style="padding:0;font-size:0;line-height:0;mso-line-height-rule:exactly;">
      <!--[if gte mso 9]>
      <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:520px;height:334px;">
      <v:fill type="frame" src="{{CARD_BG}}" color="#EBF3FF" />
      <v:textbox inset="0,0,0,0" style="mso-fit-shape-to-text:true;">
      <![endif]-->
      <div style="max-width:520px;margin:0 auto;border-radius:16px;overflow:hidden;background-color:#EBF3FF;">
        <!-- Gradient image: Gmail / mobile / Apple Mail (they ignore CSS backgrounds) -->
        <img src="{{IMG:cardbg}}" width="520" height="334" alt=""
             style="display:block;width:100%;max-width:520px;height:334px;border:0;border-radius:16px;object-fit:cover;" />
        <!-- Content pulled over the gradient -->
        <div style="margin-top:-334px;mso-margin-top-alt:0;">

          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" bgcolor="#EBF3FF">

              style="padding:48px 28px;background-color:#EBF3FF;">
          <![endif]-->
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            <tr>
              <td align="center" valign="middle"
                  style="padding:48px 28px;mso-padding-alt:48px 28px;background-color:transparent;">
