<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AG ONE Sentiment Sales</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="/css/agone.css" rel="stylesheet" />
  <link href="/css/app.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="product-shell">
  <aside class="product-sidebar" id="sidebar"></aside>
  <div class="product-main">
    <header class="product-header">
      <div class="header-title">
        <h1 id="pageTitle">AG ONE Sentiment Sales</h1>
        <p id="pageSubtitle">LSE IT offshoring intelligence platform</p>
      </div>
      <div class="header-actions">
        <select class="job-select" id="jobSelect" title="Research job filter">
          <option value="">All jobs / latest</option>
        </select>
        <button type="button" class="btn btn-secondary btn-sm" id="btnRun20">Run ×20</button>
        <button type="button" class="btn btn-primary btn-sm" id="btnRun100">Run ×100</button>
        <a class="btn btn-secondary btn-sm" id="btnExcel" href="/api/export/excel">Export Excel</a>
      </div>
    </header>
    <div class="product-body" id="viewRoot">
      <div class="empty-state"><p>Loading…</p></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
